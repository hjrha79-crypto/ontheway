<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OnTheWay — 이동 연결 플랫폼</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0F14;
    --surface: #161920;
    --surface2: #1E2230;
    --border: #2A2F3E;
    --accent: #00E5A0;
    --accent2: #FF6B35;
    --warn: #FFB800;
    --text: #F0F2F7;
    --muted: #6B7280;
    --card-h: #1A1F2E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 2px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .mode-badge {
    font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .mode-badge.active { background: rgba(0,229,160,0.1); color: var(--accent); border-color: var(--accent); }

  main { max-width: 480px; margin: 0 auto; padding: 20px 16px 100px; }

  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 10px; margin-top: 24px;
  }

  .status-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; margin-bottom: 6px;
  }
  .status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 10px;
    display: flex; flex-direction: column; gap: 4px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .status-card:active { transform: scale(0.97); }
  .status-card.filled { border-color: var(--accent); }
  .status-card .s-label { font-size: 10px; color: var(--muted); font-weight: 500; }
  .status-card .s-value { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-card .s-icon { font-size: 18px; margin-bottom: 2px; }

  .input-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: none; flex-direction: column; gap: 12px;
    margin-top: 8px;
    animation: slideDown 0.2s ease;
  }
  .input-panel.open { display: flex; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .input-panel input, .input-panel select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; padding: 12px 14px;
    width: 100%; outline: none; transition: border-color 0.2s;
  }
  .input-panel input:focus, .input-panel select:focus { border-color: var(--accent); }
  .input-panel input::placeholder { color: var(--muted); }
  .input-panel select option { background: var(--surface2); }
  .panel-confirm {
    background: var(--accent); color: #000;
    border: none; border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 700;
    padding: 12px; cursor: pointer; transition: opacity 0.2s;
  }
  .panel-confirm:active { opacity: 0.8; }

  .call-input-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }
  .tab-row { display: flex; border-bottom: 1px solid var(--border); }
  .tab {
    flex: 1; padding: 12px; text-align: center;
    font-size: 13px; font-weight: 700; color: var(--muted);
    cursor: pointer; background: transparent; border: none; transition: all 0.2s;
  }
  .tab.active { color: var(--accent); background: rgba(0,229,160,0.06); }

  .tab-content { display: none; padding: 14px; }
  .tab-content.active { display: block; }

  .call-list-area { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .call-row {
    display: grid; grid-template-columns: 1fr 1fr 80px 44px; gap: 6px;
  }
  .call-row input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; padding: 10px; outline: none; transition: border-color 0.2s; width: 100%;
  }
  .call-row input:focus { border-color: var(--accent); }
  .call-row input::placeholder { color: var(--muted); font-size: 12px; }
  .del-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .del-btn:active { color: var(--accent2); border-color: var(--accent2); }
  .add-row-btn {
    background: transparent; border: 1px dashed var(--border);
    border-radius: 8px; color: var(--muted);
    font-size: 13px; font-weight: 600; padding: 10px;
    cursor: pointer; width: 100%; transition: all 0.2s;
  }
  .add-row-btn:active { border-color: var(--accent); color: var(--accent); }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 32px 20px; text-align: center; cursor: pointer;
    transition: all 0.3s; position: relative;
  }
  .upload-zone.drag-over { border-color: var(--accent); background: rgba(0,229,160,0.05); }
  .upload-zone .up-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-zone .up-text { font-size: 14px; color: var(--muted); line-height: 1.5; }
  .upload-zone .up-text b { color: var(--text); }
  #fileInput { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .preview-item { aspect-ratio: 1; border-radius: 8px; overflow: hidden; position: relative; background: var(--surface2); }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .preview-item .rm-img {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.7); border: none; border-radius: 50%;
    color: #fff; font-size: 12px; width: 22px; height: 22px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .recommend-btn {
    width: 100%; margin-top: 14px;
    background: var(--accent); color: #000; border: none; border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px; padding: 16px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .recommend-btn:active { transform: scale(0.98); opacity: 0.9; }
  .recommend-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }
  .recommend-btn .btn-spinner {
    width: 20px; height: 20px;
    border: 3px solid rgba(0,0,0,0.3); border-top-color: #000;
    border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }
  .recommend-btn.loading .btn-spinner { display: block; }
  .recommend-btn.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-section { margin-top: 28px; }
  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .result-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--accent); }
  .result-mode-tag {
    font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
    background: rgba(0,229,160,0.1); color: var(--accent); border: 1px solid rgba(0,229,160,0.3);
  }

  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 10px;
    position: relative; overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  .result-card:nth-child(2) { animation-delay: 0.08s; }
  .result-card:nth-child(3) { animation-delay: 0.16s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%; background: var(--accent);
  }
  .result-card.second::before { background: var(--muted); }
  .result-card.third::before { background: var(--border); filter: brightness(1.8); }
  .result-card.fallback::before { background: var(--accent2); }
  .result-card.warn::before { background: var(--warn); }

  .rank-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .rank-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; line-height: 1; color: var(--accent); }
  .result-card.second .rank-num { color: var(--muted); }
  .result-card.third .rank-num { color: var(--border); filter: brightness(2); }
  .rank-label { font-size: 11px; color: var(--muted); font-weight: 600; }
  .tag-badges { display: flex; gap: 5px; margin-left: auto; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 700; }
  .tag.fallback { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .tag.warn { background: rgba(255,184,0,0.15); color: var(--warn); }
  .tag.sparse { background: rgba(0,229,160,0.1); color: var(--accent); }

  .route-line { font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
  .route-arrow { color: var(--muted); margin: 0 6px; }
  .fare { font-size: 22px; font-weight: 900; color: var(--accent); margin-bottom: 8px; }
  .result-card.second .fare { color: var(--text); }
  .result-card.third .fare { color: var(--muted); }
  .reason { font-size: 12px; color: var(--muted); background: var(--surface2); border-radius: 8px; padding: 8px 10px; line-height: 1.5; }

  .col-header { display: grid; grid-template-columns: 1fr 1fr 80px 44px; gap: 6px; margin-bottom: 4px; }
  .col-header span { font-size: 10px; color: var(--muted); font-weight: 600; padding: 0 2px; text-align: center; }
  .col-header span:first-child { text-align: left; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 30px; padding: 10px 20px;
    font-size: 13px; font-weight: 600; color: var(--text);
    opacity: 0; transition: all 0.3s; pointer-events: none;
    white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .bottom-space { height: 40px; }
</style>
</head>
<body>

<header>
  <div class="logo">On<span>The</span>Way</div>
  <div class="mode-badge" id="modeBadge">대기중</div>
</header>

<main>

  <!-- 현재 상태 -->
  <div class="section-label">현재 상태</div>
  <div class="status-row">
    <div class="status-card" id="cardLoc" onclick="openPanel('loc')">
      <span class="s-icon">📍</span>
      <span class="s-label">현재 위치</span>
      <span class="s-value" id="valLoc">미입력</span>
    </div>
    <div class="status-card" id="cardDir" onclick="openPanel('dir')">
      <span class="s-icon">🧭</span>
      <span class="s-label">방향</span>
      <span class="s-value" id="valDir">미입력</span>
    </div>
    <div class="status-card" id="cardTime" onclick="openPanel('time')">
      <span class="s-icon">⏱</span>
      <span class="s-label">가능 시간</span>
      <span class="s-value" id="valTime">미입력</span>
    </div>
  </div>

  <div class="input-panel" id="panelLoc">
    <input type="text" id="inputLoc" placeholder="예: 강남역, 서초구 반포동" inputmode="search">
    <button class="panel-confirm" onclick="saveField('loc')">확인</button>
  </div>
  <div class="input-panel" id="panelDir">
    <input type="text" id="inputDir" placeholder="예: 송파 방향, 강북 방향">
    <button class="panel-confirm" onclick="saveField('dir')">확인</button>
  </div>
  <div class="input-panel" id="panelTime">
    <select id="inputTime">
      <option value="">가능 시간 선택</option>
      <option value="제한 없음">제한 없음</option>
      <option value="10분 이상">10분 이상</option>
      <option value="20분 이상">20분 이상</option>
      <option value="30분 이상">30분 이상</option>
      <option value="1시간 이상">1시간 이상</option>
    </select>
    <button class="panel-confirm" onclick="saveField('time')">확인</button>
  </div>

  <!-- 콜 입력 -->
  <div class="section-label" style="margin-top:24px;">콜 리스트 입력</div>
  <div class="call-input-box">
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('text')">✏️ 직접 입력</button>
      <button class="tab" onclick="switchTab('image')">📷 화면 캡처</button>
    </div>

    <div class="tab-content active" id="tabText">
      <div class="col-header">
        <span>출발지</span><span>도착지</span><span style="text-align:center">금액(원)</span><span></span>
      </div>
      <div class="call-list-area" id="callList"></div>
      <button class="add-row-btn" onclick="addCallRow()">+ 콜 추가</button>
    </div>

    <div class="tab-content" id="tabImage">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
        <div class="up-icon">📸</div>
        <div class="up-text"><b>캡처 이미지 업로드</b><br>콜 리스트 화면을 2~3장 올려주세요</div>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>
  </div>

  <button class="recommend-btn" id="recommendBtn" onclick="getRecommendation()">
    <div class="btn-spinner"></div>
    <span class="btn-text">🎯 TOP 3 추천받기</span>
  </button>

  <!-- 결과 -->
  <div class="result-section" id="resultSection" style="display:none;">
    <div class="result-header">
      <div class="result-title">추천 결과</div>
      <div class="result-mode-tag" id="resultModeTag"></div>
    </div>
    <div id="resultCards"></div>
  </div>

  <div class="bottom-space"></div>
</main>

<div class="toast" id="toast"></div>

<script>
const state = { loc: '', dir: '', time: '', images: [], currentTab: 'text' };

window.addEventListener('load', () => {
  addCallRow(); addCallRow(); addCallRow();
  updateModeBadge();
});

// ── 패널 ──
function openPanel(type) {
  const ids = { loc: 'panelLoc', dir: 'panelDir', time: 'panelTime' };
  Object.entries(ids).forEach(([k, id]) => {
    const el = document.getElementById(id);
    if (k === type) {
      el.classList.toggle('open');
      if (el.classList.contains('open')) setTimeout(() => el.querySelector('input,select')?.focus(), 100);
    } else {
      el.classList.remove('open');
    }
  });
}

function saveField(type) {
  const inputIds = { loc: 'inputLoc', dir: 'inputDir', time: 'inputTime' };
  const val = document.getElementById(inputIds[type]).value.trim();
  if (!val) { showToast('값을 입력해주세요'); return; }
  state[type] = val;
  document.getElementById('val' + type.charAt(0).toUpperCase() + type.slice(1)).textContent = val;
  document.getElementById('card' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('filled');
  document.getElementById('panel' + type.charAt(0).toUpperCase() + type.slice(1)).classList.remove('open');
  updateModeBadge();
}

function updateModeBadge() {
  const badge = document.getElementById('modeBadge');
  const filled = [state.loc, state.dir, state.time].filter(Boolean).length;
  if (filled === 0) { badge.textContent = '대기중'; badge.classList.remove('active'); }
  else if (filled < 3) { badge.textContent = `${filled}/3 입력됨`; badge.classList.remove('active'); }
  else { badge.textContent = '🎯 준비완료'; badge.classList.add('active'); }
}

// ── 탭 ──
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'text') || (i === 1 && tab === 'image'));
  });
  document.getElementById('tabText').classList.toggle('active', tab === 'text');
  document.getElementById('tabImage').classList.toggle('active', tab === 'image');
}

// ── 콜 행 ──
function addCallRow() {
  const list = document.getElementById('callList');
  const id = Date.now() + Math.random();
  const row = document.createElement('div');
  row.className = 'call-row'; row.dataset.id = id;
  row.innerHTML = `
    <input type="text" placeholder="출발지" inputmode="search">
    <input type="text" placeholder="도착지" inputmode="search">
    <input type="number" placeholder="금액" inputmode="numeric">
    <button class="del-btn" onclick="this.closest('.call-row').remove()">✕</button>`;
  list.appendChild(row);
}

function getCallData() {
  return Array.from(document.querySelectorAll('.call-row')).map(row => {
    const [from, to, fare] = row.querySelectorAll('input');
    return { from: from.value.trim(), to: to.value.trim(), fare: fare.value.trim() };
  }).filter(c => c.from || c.to);
}

// ── 이미지 ──
function handleFiles(files) {
  const grid = document.getElementById('previewGrid');
  Array.from(files).forEach(file => {
    if (state.images.length >= 5) { showToast('최대 5장까지 가능합니다'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const id = Date.now() + Math.random();
      state.images.push({ id, data: e.target.result, file });
      const item = document.createElement('div');
      item.className = 'preview-item'; item.dataset.imgId = id;
      item.innerHTML = `<img src="${e.target.result}"><button class="rm-img" onclick="removeImage(${id})">✕</button>`;
      grid.appendChild(item);
    };
    reader.readAsDataURL(file);
  });
}
function removeImage(id) {
  state.images = state.images.filter(img => img.id !== id);
  document.querySelector(`[data-img-id="${id}"]`)?.remove();
}
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });

// ── 추천 요청 ──
async function getRecommendation() {
  const btn = document.getElementById('recommendBtn');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    let messages;
    const prompt = buildPrompt();

    if (state.currentTab === 'image' && state.images.length > 0) {
      const content = [{ type: 'text', text: prompt }];
      for (const img of state.images.slice(0, 4)) {
        content.push({ type: 'image', source: { type: 'base64', media_type: img.file.type || 'image/jpeg', data: img.data.split(',')[1] } });
      }
      messages = [{ role: 'user', content }];
    } else {
      const calls = getCallData();
      if (calls.length === 0) { showToast('콜 정보를 최소 1개 입력해주세요'); return; }
      const callText = calls.map((c, i) => `${i+1}. ${c.from} → ${c.to} / ${c.fare || '미기재'}원`).join('\n');
      messages = [{ role: 'user', content: prompt + '\n\n[콜 리스트]\n' + callText }];
    }

    // ★ 서버 API 라우트 호출 (CORS 문제 없음)
    const res = await fetch('/api/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || `서버 오류 (${res.status})`);
    }

    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    renderResult(text);

  } catch (e) {
    showToast('오류: ' + e.message);
    console.error(e);
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

function buildPrompt() {
  return `당신은 OnTheWay v2 추천 알고리즘입니다.
현재 기사 정보:
- 현재 위치: ${state.loc || '미입력'}
- 이동 방향: ${state.dir || '미입력'}
- 가능 시간: ${state.time || '미입력'}

[추천 규칙 v2]
1. 콜 수량·시간대 기준으로 모드 판단 (Standard / Sparse / Redirect / Off-peak)
2. Hard Filter: 시간 불가 콜 제거, 금액 최저선 미달 제거 (Standard: 10,000원 / Sparse: 7,000원)
3. 방향 점수: 픽업방향(0~5점) + 도착방향(0~5점) = 방향종합점수(0~10점)
4. 효율 점수: 금액÷(이동거리+픽업거리) 기반 점수(0~10점)
5. 종합스코어: 방향점수×가중치 + 효율점수×가중치 (Standard: 70/30, Sparse: 50/50)
6. 상위 3개 추천, 부족 시 fallback
7. fallback 콜에는 🔄, 시간 촉박 콜에는 ⚠️, Sparse 모드에는 ⚡ 표시

[출력 형식 - 반드시 아래 JSON만 반환, 다른 텍스트 없이]
{
  "mode": "모드명",
  "results": [
    { "rank": 1, "from": "출발지", "to": "도착지", "fare": "금액", "tags": [], "reason": "이유 한 줄" }
  ],
  "notice": "특이사항 있으면 한 줄, 없으면 빈 문자열"
}
tags 가능 값: "fallback", "warn", "sparse"
${state.currentTab === 'image' ? '첨부된 콜 화면 이미지를 분석해 콜 리스트를 파악하고 위 규칙으로 추천하세요.' : ''}`;
}

// ── 결과 렌더링 ──
function renderResult(text) {
  let parsed;
  try {
    parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
  } catch {
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultModeTag').textContent = '';
    document.getElementById('resultCards').innerHTML = `<div class="result-card"><div style="font-size:14px;line-height:1.8;white-space:pre-wrap;">${text}</div></div>`;
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  document.getElementById('resultSection').style.display = 'block';
  document.getElementById('resultModeTag').textContent = parsed.mode || '';

  const rankClass = ['', 'first', 'second', 'third'];
  const rankLabel = ['', '1위 추천', '2순위', '3순위'];
  let html = '';

  (parsed.results || []).forEach(r => {
    const tags = r.tags || [];
    const cls = ['result-card', rankClass[r.rank] || ''];
    if (tags.includes('fallback')) cls.push('fallback');
    if (tags.includes('warn')) cls.push('warn');
    const tagHtml = tags.map(t => {
      const m = { fallback: ['fallback','🔄 fallback'], warn: ['warn','⚠️ 주의'], sparse: ['sparse','⚡ 콜 부족'] };
      return `<span class="tag ${m[t]?.[0]||''}">${m[t]?.[1]||t}</span>`;
    }).join('');
    const fareNum = Number(String(r.fare).replace(/[^0-9]/g,''));
    html += `
    <div class="${cls.join(' ')}">
      <div class="rank-row">
        <div class="rank-num">${r.rank}</div>
        <div class="rank-label">${rankLabel[r.rank]||''}</div>
        <div class="tag-badges">${tagHtml}</div>
      </div>
      <div class="route-line">${r.from||'?'}<span class="route-arrow">→</span>${r.to||'?'}</div>
      <div class="fare">${fareNum ? fareNum.toLocaleString()+'원' : r.fare}</div>
      <div class="reason">${r.reason||''}</div>
    </div>`;
  });

  if (parsed.notice) html += `<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0;">${parsed.notice}</div>`;
  if (!html) html = `<div style="text-align:center;padding:40px;color:var(--muted);font-size:14px;">추천 가능한 콜이 없습니다.</div>`;

  document.getElementById('resultCards').innerHTML = html;
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
